<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>YSGF · API Redirect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.02);
            padding: 2rem 2rem 2.2rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card:hover {
            box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.15);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0;
        }

        .version-badge {
            font-size: 0.9rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 0;
            border-bottom: 1px dashed #cbd5e1;
            display: inline-block;
            padding-bottom: 0;
        }

        .message {
            background: #fff7ed;
            border-left: 4px solid #f59e0b;
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;            
            text-align: left;
        }

        .message p {
            color: #92400e;
            font-weight: 500;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .target-url {
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            word-break: break-all;
            color: #0f172a;            
            border: 1px solid #e2e8f0;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;            
        }

        .btn-primary {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .btn-primary:hover {
            background: #1e293b;
            transform: scale(1.01);
            box-shadow: 0 8px 20px -8px rgba(15, 23, 42, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 0.85rem 1.8rem;
            border-radius: 60px;
            font-weight: 500;
            color: #1e293b;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-outline:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        .redirect-timer {            
            font-size: 0.85rem;
            color: #4b5563;
            background: #f9fafb;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            display: inline-block;
            font-weight: 450;
        }

        .redirect-timer strong {
            font-weight: 700;
            color: #0f172a;
            background: #e2e8f0;
            padding: 0.15rem 0.5rem;
            border-radius: 30px;
            margin: 0 2px;
        }

        hr {
            margin: 1.6rem 0 1rem;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #cbd5e1, transparent);
        }

        .small-note {
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 0.5rem;
        }

        @media (max-width: 500px) {
            .card {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .btn-primary,
            .btn-outline {
                padding: 0.7rem 1.4rem;
                font-size: 0.9rem;
            }
        }

        /* accessibility focus */
        a:focus-visible,
        button:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
            border-radius: 40px;
        }
    </style>
</head>

<body>

    <div class="card" role="main">        
        <h1>YSGF API</h1>
        <div class="version-badge">Version 2 → Version 3</div>

        <div class="btn-group">
            <a href="#" id="manualRedirectBtn" class="btn-primary">
                ✨ Go to Version 3 →
            </a>
        </div>

        <div id="timerContainer" class="redirect-timer">
            ⏱️ Redirecting in <strong id="countdownDisplay">5</strong> seconds
        </div>

    </div>

    <script>
        const V3_URL = "https://professor-yasirsultan.github.io/ysgf/api/index.html";

        // DOM elements
        const displaySpan = document.getElementById("displayUrl");
        const manualBtn = document.getElementById("manualRedirectBtn");
        const copyBtn = document.getElementById("copyLinkBtn");
        const countdownSpan = document.getElementById("countdownDisplay");
        const timerContainer = document.getElementById("timerContainer");

        let countdown = 5;
        let redirectTimer = null;

        // Display target URL (clean formatting)
        if (displaySpan) {
            displaySpan.textContent = V3_URL;
        }

        // Set the href for manual button
        if (manualBtn) {
            manualBtn.href = V3_URL;
            manualBtn.setAttribute("target", "_self");
            // add extra safety: prevent any default weirdness
            manualBtn.addEventListener("click", function (e) {
                // clear auto-redirect when user clicks manually
                if (redirectTimer) {
                    clearInterval(redirectTimer);
                    redirectTimer = null;
                }
                // (optional visual feedback, no double redirect)
            });
        }

        // Copy to clipboard functionality
        if (copyBtn) {
            copyBtn.addEventListener("click", async function (e) {
                e.preventDefault();
                try {
                    await navigator.clipboard.writeText(V3_URL);
                    // temporary feedback
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = "✓ Copied!";
                    setTimeout(() => {
                        copyBtn.innerText = originalText;
                    }, 18000);
                } catch (err) {
                    // fallback for older browsers
                    const textarea = document.createElement("textarea");
                    textarea.value = V3_URL;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textarea);
                    copyBtn.innerText = "✓ Copied!";
                    setTimeout(() => {
                        copyBtn.innerText = "📋 Copy link";
                    }, 18000);
                }
            });
        }

        // Update countdown display
        function updateCountdownDisplay() {
            if (countdownSpan) {
                countdownSpan.textContent = countdown;
            }
        }

        // Perform redirect
        function performRedirect() {
            if (redirectTimer) {
                clearInterval(redirectTimer);
                redirectTimer = null;
            }
            window.location.href = V3_URL;
        }

        // Start countdown and redirect
        function startRedirectTimer() {
            if (redirectTimer) clearInterval(redirectTimer);
            countdown = 3;
            updateCountdownDisplay();

            redirectTimer = setInterval(() => {
                if (countdown <= 1) {
                    clearInterval(redirectTimer);
                    redirectTimer = null;
                    performRedirect();
                } else {
                    countdown--;
                    updateCountdownDisplay();
                }
            }, 1000);
        }

        // If the user clicks the manual link, we also clear timer (already done in click handler)
        // Also when page unloads, clear interval to avoid memory (but not crucial)
        window.addEventListener("beforeunload", function () {
            if (redirectTimer) clearInterval(redirectTimer);
        });

        // start the auto redirect process after page load
        window.addEventListener("load", function () {
            startRedirectTimer();
        });
    </script>
</body>

</html>
