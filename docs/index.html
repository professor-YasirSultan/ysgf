<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="YSGF — Yasir Sultan Geodesic Flux. Under Construction.">
  <meta name="theme-color" content="#0a0f1f">
  <title>YSGF · Under Construction</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b1120, #03060c);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* animated flux background — smooth gradient drift */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, 
        rgba(20, 40, 70, 0.45) 0%, 
        rgba(10, 20, 40, 0.7) 40%,
        rgba(30, 15, 55, 0.6) 70%,
        rgba(0, 30, 45, 0.5) 100%);
      background-size: 200% 200%;
      animation: fluxShift 18s ease infinite;
      pointer-events: none;
      z-index: -2;
    }

    /* subtle grid pattern — geodesic reference */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(0deg, rgba(100, 150, 220, 0.08) 0px, rgba(100, 150, 220, 0.08) 1px, transparent 1px, transparent 32px),
        repeating-linear-gradient(90deg, rgba(100, 150, 220, 0.08) 0px, rgba(100, 150, 220, 0.08) 1px, transparent 1px, transparent 32px),
        radial-gradient(circle at 30% 40%, rgba(255,255,240,0.02) 2px, transparent 2px);
      background-size: 64px 64px, 64px 64px, 28px 28px;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes fluxShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* main card container */
    .construction-card {
      max-width: 780px;
      width: 100%;
      background: rgba(8, 18, 28, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 3rem;
      padding: 3rem 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(90, 150, 220, 0.2) inset, 0 0 0 2px rgba(255, 255, 255, 0.03) inset;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      position: relative;
      z-index: 10;
      border: 1px solid rgba(70, 130, 200, 0.25);
    }

    .construction-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 32px 55px -14px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(100, 180, 250, 0.35) inset;
      border-color: rgba(100, 180, 250, 0.4);
    }

    /* geodesic ring decoration (dynamic rotation) */
    .geometric-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110%;
      height: 110%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
      opacity: 0.4;
      border-radius: 50%;
    }

    .geometric-ring::before,
    .geometric-ring::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      border-radius: 48% 52% 44% 56% / 42% 45% 55% 58%;
      background: transparent;
      border: 1px solid rgba(80, 150, 240, 0.4);
      transform: translate(-50%, -50%);
      animation: morphRing 16s infinite ease-in-out;
    }

    .geometric-ring::after {
      width: 80%;
      height: 80%;
      border-color: rgba(120, 180, 255, 0.3);
      animation: morphRingReverse 14s infinite ease-in-out;
      border-width: 0.5px;
    }

    @keyframes morphRing {
      0% { border-radius: 48% 52% 44% 56% / 42% 45% 55% 58%; transform: translate(-50%, -50%) rotate(0deg);}
      50% { border-radius: 62% 38% 56% 44% / 48% 55% 45% 52%; transform: translate(-50%, -50%) rotate(6deg);}
      100% { border-radius: 48% 52% 44% 56% / 42% 45% 55% 58%; transform: translate(-50%, -50%) rotate(0deg);}
    }

    @keyframes morphRingReverse {
      0% { border-radius: 55% 45% 60% 40% / 50% 52% 48% 50%; transform: translate(-50%, -50%) rotate(0deg);}
      50% { border-radius: 42% 58% 38% 62% / 55% 48% 52% 45%; transform: translate(-50%, -50%) rotate(-5deg);}
      100% { border-radius: 55% 45% 60% 40% / 50% 52% 48% 50%; transform: translate(-50%, -50%) rotate(0deg);}
    }

    /* logo styles */
    .logo {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FFFFFF, #a3c6ff, #6fa8ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 10px rgba(0, 160, 255, 0.2);
      margin-bottom: 0.6rem;
    }

    .brand-full {
      font-size: 1.7rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #bfd9ff;
      background: rgba(255,255,245,0.05);
      display: inline-block;
      padding: 0.3rem 1.4rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-bottom: 2.2rem;
      border: 0.5px solid rgba(130, 200, 255, 0.3);
    }

    /* under construction badge */
    .status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      padding: 0.7rem 1.8rem;
      border-radius: 100px;
      border: 1px solid rgba(255, 200, 100, 0.6);
      margin-bottom: 2.8rem;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.03em;
      color: #ffe3a3;
      box-shadow: 0 0 12px rgba(255, 160, 50, 0.2);
    }

    .footer-note {
      font-size: 0.85rem;
      color: #8aa6cc;
      letter-spacing: 0.3px;
      margin-top: 1rem;
      border-top: none;
      padding-top: 0;
      opacity: 0.9;
    }

    /* responsive */
    @media (max-width: 640px) {
      .construction-card {
        padding: 2rem 1.5rem;
        border-radius: 2rem;
      }
      .logo {
        font-size: 3rem;
      }
      .brand-full {
        font-size: 1rem;
        padding: 0.2rem 1rem;
        margin-bottom: 1.8rem;
      }
      .status-chip {
        font-size: 0.95rem;
        padding: 0.5rem 1.3rem;
        margin-bottom: 2rem;
      }
      .footer-note {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

<div class="construction-card">
  <!-- decorative rotating geodesic rings (visual identity preserved) -->
  <div class="geometric-ring"></div>

  <!-- only the requested text elements -->
  <div class="logo">YSGF</div>
  <div class="brand-full">Yasir Sultan Geodesic Flux</div><br>
  <div class="status-chip">🚧 UNDER CONSTRUCTION 🚧</div>
  <div class="footer-note">© 2026 YSGF — Yasir Sultan Geodesic Flux</div>
</div>

</body>
</html>
