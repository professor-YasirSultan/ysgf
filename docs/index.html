<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="YSGF — Yasir Sultan Geodesic Flux.">
  <meta name="theme-color" content="#0a0f1f">
  <title>YSGF — Yasir Sultan Geodesic Flux.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b1120, #03060c);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    /* main card container */
    .construction-card {
      max-width: 780px;
      width: 100%;
      background: rgba(8, 18, 28, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 3rem;
      padding: 3rem 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(90, 150, 220, 0.2) inset, 0 0 0 2px rgba(255, 255, 255, 0.03) inset;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      position: relative;
      z-index: 10;
      border: 1px solid rgba(70, 130, 200, 0.25);
    }

    .construction-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 32px 55px -14px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(100, 180, 250, 0.35) inset;
      border-color: rgba(100, 180, 250, 0.4);
    }

    /* geodesic ring decoration (dynamic rotation) */
    .geometric-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110%;
      height: 110%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
      opacity: 0.4;
      border-radius: 50%;
    }



    /* logo styles */
    .logo {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FFFFFF, #a3c6ff, #6fa8ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 10px rgba(0, 160, 255, 0.2);
      margin-bottom: 0.6rem;
    }

    .brand-full {
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #bfd9ff;
      background: rgba(255,255,245,0.05);
      display: inline-block;
      padding: 0.3rem 1.4rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      margin-bottom: 2.2rem;
      border: 0.5px solid rgba(130, 200, 255, 0.3);
    }
a{
display: block;
      color: #bfd9ff;
text-decoration: none;
}
    /* under construction badge */
    .status-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      padding: 0.7rem 1.8rem;
      border-radius: 100px;
      border: 1px solid rgba(255, 200, 100, 0.6);
      margin-bottom: 2.8rem;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.03em;
      color: #ffe3a3;
      box-shadow: 0 0 12px rgba(255, 160, 50, 0.2);
    }

    .footer-note {
      font-size: 0.85rem;
      color: #8aa6cc;
      letter-spacing: 0.3px;
      margin-top: 1rem;
      border-top: none;
      padding-top: 0;
      opacity: 0.9;
    }


      .logo {
        font-size: 3rem;
      }
      .brand-full {
        font-size: 1rem;
        padding: 0.2rem 1rem;
        margin-bottom: 1.8rem;
      }
      .status-chip {
        font-size: 0.95rem;
        padding: 0.5rem 1.3rem;
        margin-bottom: 2rem;
      }
      .footer-note {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

<div class="construction-card">
  <div class="geometric-ring"></div>

  <!-- only the requested text elements -->
  <div class="logo">YSGF</div>
  <div class="brand-full">Yasir Sultan Geodesic Flux</div><br>
  <div class="status-chip"><a href="https://professor-yasirsultan.github.io/ysgf/YSGF_v1-1.pdf">Download PDF</a></div>

<br>
<img src="https://professor-yasirsultan.github.io/ysgf/globeLondon.png" alt="globeLondon" width="80%"><br><br>
<img src="https://professor-yasirsultan.github.io/ysgf/mapLondon.png" alt="mapLondon" width="80%"><br><br>
<img src="https://professor-yasirsultan.github.io/ysgf/mapWorld.png" alt="mapWorld" width="80%">

  <div class="footer-note">© 2026 YSGF — Yasir Sultan Geodesic Flux</div>
</div>

</body>
</html>
